<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Management Planner</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <!-- LEFT: Title -->
        <div class="app-title">Management Planner</div>

        <!-- CENTER: Week Navigation -->
        <div class="week-controls">
            <button id="prevWeekBtn" class="week-btn">◀</button>
            <span id="currentWeekLabel"></span>
            <button id="nextWeekBtn" class="week-btn">▶</button>
        </div>

        <!-- RIGHT: File | Settings segmented control -->
        <div class="header-controls">
            <div class="segmented-control">
                <button id="fileMenuBtn" class="segment-btn">File</button>
                <button id="settingsBtn" class="segment-btn">Settings</button>
            </div>

            <!-- FILE MENU DROPDOWN -->
            <div id="fileMenu" class="filemenu hidden">
                <div class="filemenu-item" id="manualSaveBtn">💾 Save</div>
                <div class="filemenu-item" id="exportCsvBtn">Export Week CSV</div>
                <div class="filemenu-item" id="exportAllCsvBtn">Export All Weeks CSV</div>
                <div class="filemenu-item" id="exportJsonBtn">Export JSON</div>

                <label class="filemenu-item">
                    Import JSON
                    <input type="file" id="importJsonInput" accept=".json" />
                </label>

                <div class="filemenu-item" id="copyShareLinkBtn">📋 Copy Share Link</div>
            </div>
        </div>
    </header>

    <!-- SETTINGS PANEL (unchanged) -->
    <div id="settingsPanel" class="settings-panel hidden">
        <h2>Settings</h2>
        <label>
            Default District:
            <input type="text" id="defaultDistrictInput" />
        </label>
        <button id="saveSettingsBtn">Save Settings</button>
    </div>

    <!-- MAIN CONTENT -->
    <main>
        <section id="jobsSection" class="column">
            <h2>Jobs</h2>
            <div class="add-row">
                <input id="jobNameInput" type="text" placeholder="New Job Name" />
                <button id="addJobBtn">Add Job</button>
            </div>
            <div id="jobsList"></div>
        </section>

        <section id="employeesSection" class="column">
            <h2>Employees</h2>
            <div class="add-row">
                <input id="employeeNameInput" type="text" placeholder="Employee Name" />
                <input id="employeeBudgetInput" type="number" placeholder="Hours (default 40)" />
                <input id="employeeDistrictInput" type="text" placeholder="District" />
                <button id="addEmployeeBtn">Add Employee</button>
            </div>
            <div id="employeesList"></div>
        </section>

        <section id="summarySection" class="column">
            <h2>Summary</h2>
            <canvas id="summaryChart"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
